<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0d1117"/>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg2)"/>
  <!-- Rust crab simplified -->
  <g transform="translate(200, 75)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#ff6600" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="20" ry="14" fill="#ff6600" opacity="0.5"/>
    <!-- Claws -->
    <path d="M-25,-5 C-40,-15 -45,-5 -40,0 C-35,5 -30,5 -25,0" fill="#ff6600" opacity="0.4"/>
    <path d="M25,-5 C40,-15 45,-5 40,0 C35,5 30,5 25,0" fill="#ff6600" opacity="0.4"/>
    <!-- Eyes -->
    <circle cx="-7" cy="-3" r="3" fill="#ff6600"/>
    <circle cx="7" cy="-3" r="3" fill="#ff6600"/>
  </g>
  <!-- Sound wave -->
  <g transform="translate(200, 130)" fill="none" stroke="#ff6600" stroke-width="2" opacity="0.6">
    <path d="M-40,0 C-35,-15 -25,-15 -20,0"/>
    <path d="M-20,0 C-15,-25 -5,-25 0,0"/>
    <path d="M0,0 C5,-25 15,-25 20,0"/>
    <path d="M20,0 C25,-15 35,-15 40,0"/>
  </g>
  <!-- Play button -->
  <polygon points="200,155 190,148 190,162" fill="#ff6600" opacity="0.5"/>
  <!-- Title -->
  <text x="200" y="210" text-anchor="middle" fill="#ff6600" font-family="monospace" font-size="12" font-weight="bold">Staarscreaam.wav</text>
  <text x="200" y="228" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Music App · Rust</text>
</svg>
