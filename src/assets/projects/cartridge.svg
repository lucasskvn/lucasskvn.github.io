<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#1a1a1a"/>
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2e1a0a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg9)"/>
  <!-- GameBoy -->
  <g transform="translate(200, 70)" fill="none" stroke="#8b4513" stroke-width="2" opacity="0.5">
    <rect x="-30" y="-25" width="60" height="50" rx="6"/>
    <!-- Screen -->
    <rect x="-20" y="-18" width="40" height="25" rx="3" fill="#8b4513" opacity="0.1"/>
    <!-- D-pad -->
    <line x1="-15" y1="10" x2="-5" y2="10"/>
    <line x1="-10" y1="5" x2="-10" y2="15"/>
    <!-- Buttons -->
    <circle cx="10" cy="8" r="3"/>
    <circle cx="18" cy="8" r="3"/>
  </g>
  <!-- Cartridge -->
  <g transform="translate(200, 155)" fill="none" stroke="#8b4513" stroke-width="2" opacity="0.4">
    <rect x="-20" y="-8" width="40" height="16" rx="2"/>
    <rect x="-12" y="-12" width="24" height="4" rx="1"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#8b4513" font-family="monospace" font-size="14" font-weight="bold">Cartridge</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">GameBoy Recreation · C</text>
</svg>
