<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#1a1a1a"/>
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d1b00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg5)"/>
  <!-- Monkey face -->
  <g transform="translate(200, 70)" fill="none" stroke="#ff8c00" stroke-width="2">
    <ellipse cx="0" cy="0" rx="30" ry="25" fill="#ff8c00" opacity="0.15"/>
    <!-- Ears -->
    <circle cx="-28" cy="-15" r="8" fill="#ff8c00" opacity="0.2"/>
    <circle cx="28" cy="-15" r="8" fill="#ff8c00" opacity="0.2"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-5" r="4" fill="#ff8c00" opacity="0.5"/>
    <circle cx="10" cy="-5" r="4" fill="#ff8c00" opacity="0.5"/>
    <!-- Mouth -->
    <path d="M-8,8 C-4,14 4,14 8,8" stroke="#ff8c00" opacity="0.5"/>
  </g>
  <!-- Tournament bracket -->
  <g transform="translate(200, 150)" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.4">
    <line x1="-50" y1="0" x2="-20" y2="0"/>
    <line x1="-20" y1="-10" x2="-20" y2="10"/>
    <line x1="-20" y1="-10" x2="0" y2="-10"/>
    <line x1="-20" y1="10" x2="0" y2="10"/>
    <line x1="0" y1="-10" x2="0" y2="10"/>
    <line x1="0" y1="0" x2="20" y2="0"/>
    <line x1="20" y1="0" x2="50" y2="0"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#ff8c00" font-family="monospace" font-size="12" font-weight="bold">FarmerMonkey</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Discord Tournament Bot</text>
</svg>
