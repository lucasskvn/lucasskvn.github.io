<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0d1117"/>
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg10)"/>
  <!-- Chat bubbles -->
  <g transform="translate(200, 70)" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.5">
    <rect x="-35" y="-20" width="50" height="25" rx="8"/>
    <polygon points="-15,5 -10,-5 -5,5" fill="#0d1117" stroke="#58a6ff"/>
    <rect x="10" y="0" width="50" height="25" rx="8"/>
    <polygon points="30,25 25,15 35,15" fill="#0d1117" stroke="#58a6ff"/>
  </g>
  <!-- Server -->
  <g transform="translate(200, 150)" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.4">
    <rect x="-20" y="-15" width="40" height="30" rx="3"/>
    <line x1="-15" y1="-5" x2="15" y2="-5"/>
    <line x1="-15" y1="5" x2="15" y2="5"/>
    <circle cx="15" cy="-5" r="2" fill="#58a6ff" opacity="0.3"/>
    <circle cx="15" cy="5" r="2" fill="#58a6ff" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="12" font-weight="bold">my_teams</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Client/Server Chat · Rust</text>
</svg>
