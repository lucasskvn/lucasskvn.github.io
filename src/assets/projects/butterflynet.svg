<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#1a1a2e"/>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg1)"/>
  <!-- Butterfly icon -->
  <g transform="translate(200, 80)" fill="none" stroke="#a259ff" stroke-width="2.5">
    <!-- Left wing -->
    <path d="M0,0 C-20,-30 -60,-40 -70,-20 C-80,0 -50,10 -30,5 C-20,2 -10,0 0,0" fill="#a259ff" opacity="0.3"/>
    <path d="M0,0 C-15,10 -40,30 -35,45 C-30,55 -10,40 0,20" fill="#a259ff" opacity="0.2"/>
    <!-- Right wing -->
    <path d="M0,0 C20,-30 60,-40 70,-20 C80,0 50,10 30,5 C20,2 10,0 0,0" fill="#a259ff" opacity="0.3"/>
    <path d="M0,0 C15,10 40,30 35,45 C30,55 10,40 0,20" fill="#a259ff" opacity="0.2"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="4" ry="15" fill="#a259ff"/>
  </g>
  <!-- Server rack lines -->
  <g stroke="#2a2a4e" stroke-width="2">
    <line x1="120" y1="160" x2="280" y2="160"/>
    <line x1="120" y1="175" x2="280" y2="175"/>
    <line x1="120" y1="190" x2="280" y2="190"/>
  </g>
  <!-- Server dots -->
  <circle cx="140" cy="167" r="3" fill="#4a4a6e"/>
  <circle cx="155" cy="167" r="3" fill="#4a4a6e"/>
  <circle cx="140" cy="182" r="3" fill="#4a4a6e"/>
  <circle cx="155" cy="182" r="3" fill="#4a4a6e"/>
  <!-- Green LED -->
  <circle cx="260" cy="167" r="3" fill="#00ff88"/>
  <circle cx="260" cy="182" r="3" fill="#00ff88"/>
  <!-- Title -->
  <text x="200" y="230" text-anchor="middle" fill="#a259ff" font-family="monospace" font-size="14" font-weight="bold">ButterflyNet</text>
  <text x="200" y="245" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">IRC Server</text>
</svg>
