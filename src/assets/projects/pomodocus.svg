<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#1a1a1a"/>
  <defs>
    <linearGradient id="bgp1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2e1a0a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bgp1)"/>
  <!-- Tomato / Pomodoro -->
  <g transform="translate(200, 70)" fill="none" stroke="#ff4444" stroke-width="2">
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="#ff4444" opacity="0.15"/>
    <path d="M-5,-30 C-3,-35 3,-35 5,-30" stroke="#4a4" stroke-width="2.5"/>
    <line x1="0" y1="-30" x2="0" y2="-25" stroke="#4a4" stroke-width="2"/>
  </g>
  <!-- Dinosaur -->
  <g transform="translate(200, 145)" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5">
    <ellipse cx="0" cy="0" rx="20" ry="12"/>
    <path d="M-20,-5 L-30,-15 L-25,-5"/>
    <line x1="15" y1="-5" x2="25" y2="-15"/>
    <line x1="15" y1="5" x2="25" y2="15"/>
    <line x1="-10" y1="10" x2="-15" y2="20"/>
    <line x1="5" y1="10" x2="10" y2="20"/>
    <circle cx="-8" cy="-3" r="2" fill="#4ade80"/>
  </g>
  <!-- Timer -->
  <g transform="translate(200, 145)" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.3">
    <circle cx="0" cy="0" r="15"/>
    <line x1="0" y1="0" x2="0" y2="-12"/>
    <line x1="0" y1="0" x2="10" y2="0"/>
  </g>
  <text x="200" y="220" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="14" font-weight="bold">Pomodocus</text>
  <text x="200" y="238" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Gamified Pomodoro · React</text>
</svg>
