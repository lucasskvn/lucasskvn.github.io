<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg11)"/>
  <!-- Broom / cleaning -->
  <g transform="translate(200, 70)" fill="none" stroke="#e6c300" stroke-width="2" opacity="0.5">
    <line x1="0" y1="-20" x2="0" y2="15"/>
    <path d="M-15,15 L15,15 L10,25 L-10,25 Z" fill="#e6c300" opacity="0.15"/>
  </g>
  <!-- Sparkles -->
  <g fill="#e6c300" opacity="0.4">
    <circle cx="-30" cy="-10" r="2"/>
    <circle cx="30" cy="-5" r="1.5"/>
    <circle cx="-20" cy="10" r="1.5"/>
    <circle cx="25" cy="15" r="2"/>
  </g>
  <!-- Code lines being cleaned -->
  <g transform="translate(200, 145)" fill="none" stroke="#e6c300" stroke-width="1.5" opacity="0.3">
    <line x1="-40" y1="-10" x2="10" y2="-10"/>
    <line x1="-30" y1="0" x2="20" y2="0"/>
    <line x1="-35" y1="10" x2="15" y2="10"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#e6c300" font-family="monospace" font-size="14" font-weight="bold">Codewash</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Refactoring · Cleanup</text>
</svg>
