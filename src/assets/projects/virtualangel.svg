<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0a0a1a"/>
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg6)"/>
  <!-- Angel wings -->
  <g transform="translate(200, 75)" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.4">
    <path d="M-5,0 C-20,-30 -50,-35 -60,-20 C-70,-5 -50,5 -30,10 C-20,12 -10,5 -5,0"/>
    <path d="M5,0 C20,-30 50,-35 60,-20 C70,-5 50,5 30,10 C20,12 10,5 5,0"/>
  </g>
  <!-- Halo -->
  <ellipse cx="0" cy="-20" rx="20" ry="6" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.3" transform="translate(200, 55)"/>
  <!-- Brain / AI nodes -->
  <g transform="translate(200, 140)" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.4">
    <circle cx="0" cy="0" r="5"/>
    <circle cx="-25" cy="-15" r="3"/>
    <circle cx="25" cy="-15" r="3"/>
    <circle cx="-20" cy="15" r="3"/>
    <circle cx="20" cy="15" r="3"/>
    <line x1="0" y1="0" x2="-25" y2="-15"/>
    <line x1="0" y1="0" x2="25" y2="-15"/>
    <line x1="0" y1="0" x2="-20" y2="15"/>
    <line x1="0" y1="0" x2="20" y2="15"/>
    <line x1="-25" y1="-15" x2="25" y2="-15"/>
    <line x1="-20" y1="15" x2="20" y2="15"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="12" font-weight="bold">VirtualAngel</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Conversational AI Bot</text>
</svg>
