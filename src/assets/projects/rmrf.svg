<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg3)"/>
  <!-- Hard drive icon -->
  <g transform="translate(200, 75)">
    <rect x="-35" y="-20" width="70" height="40" rx="4" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
    <rect x="-25" y="-10" width="50" height="20" rx="2" fill="#00d4aa" opacity="0.15"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="0" x2="-6" y2="0" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
    <line x1="6" y1="0" x2="10" y2="0" stroke="#00d4aa" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Chunking visualization -->
  <g transform="translate(200, 140)" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.4">
    <rect x="-60" y="-10" width="25" height="20" rx="3"/>
    <rect x="-30" y="-10" width="20" height="20" rx="3"/>
    <rect x="-5" y="-10" width="30" height="20" rx="3"/>
    <rect x="30" y="-10" width="15" height="20" rx="3"/>
    <rect x="50" y="-10" width="20" height="20" rx="3"/>
  </g>
  <!-- Title -->
  <text x="200" y="210" text-anchor="middle" fill="#00d4aa" font-family="monospace" font-size="14" font-weight="bold">RMRF</text>
  <text x="200" y="228" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Backup Tool · Rust</text>
</svg>
