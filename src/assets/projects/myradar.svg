<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0d1117"/>
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg12)"/>
  <!-- Radar screen -->
  <g transform="translate(200, 70)" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5">
    <circle cx="0" cy="0" r="30"/>
    <circle cx="0" cy="0" r="20"/>
    <circle cx="0" cy="0" r="10"/>
    <line x1="0" y1="0" x2="25" y2="-15"/>
    <line x1="0" y1="0" x2="-20" y2="20"/>
    <line x1="0" y1="0" x2="-10" y2="-25"/>
  </g>
  <!-- Airplane dots -->
  <g fill="#00ff88" opacity="0.6">
    <circle cx="25" cy="-15" r="3"/>
    <circle cx="-20" cy="20" r="2.5"/>
    <circle cx="-10" cy="-25" r="2"/>
  </g>
  <!-- Collision warning -->
  <g transform="translate(200, 150)" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.4">
    <path d="M-15,-10 L0,10 L15,-10 Z"/>
    <line x1="0" y1="-3" x2="0" y2="3"/>
    <line x1="0" y1="5" x2="0" y2="7"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="12" font-weight="bold">my_radar</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Air Traffic Simulator · C</text>
</svg>
