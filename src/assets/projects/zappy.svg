<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0a0a0a"/>
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg8)"/>
  <!-- Network nodes -->
  <g transform="translate(200, 70)" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5">
    <circle cx="0" cy="0" r="6"/>
    <circle cx="-35" cy="-20" r="4"/>
    <circle cx="35" cy="-20" r="4"/>
    <circle cx="-30" cy="20" r="4"/>
    <circle cx="30" cy="20" r="4"/>
    <line x1="0" y1="0" x2="-35" y2="-20"/>
    <line x1="0" y1="0" x2="35" y2="-20"/>
    <line x1="0" y1="0" x2="-30" y2="20"/>
    <line x1="0" y1="0" x2="30" y2="20"/>
  </g>
  <!-- Game controller -->
  <g transform="translate(200, 140)" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.4">
    <rect x="-30" y="-12" width="60" height="24" rx="12"/>
    <rect x="-40" y="-6" width="10" height="12" rx="5"/>
    <rect x="30" y="-6" width="10" height="12" rx="5"/>
    <circle cx="-10" cy="0" r="3" fill="#00ff88" opacity="0.3"/>
    <circle cx="10" cy="0" r="3" fill="#00ff88" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="14" font-weight="bold">Zappy</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">Multiplayer Network Game</text>
</svg>
