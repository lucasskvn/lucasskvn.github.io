<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <rect width="400" height="250" rx="12" fill="#0d1117"/>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" rx="12" fill="url(#bg4)"/>
  <!-- Code brackets -->
  <g transform="translate(200, 75)" fill="none" stroke="#58a6ff" stroke-width="3" opacity="0.5">
    <path d="M-30,-20 L-50,0 L-30,20"/>
    <path d="M30,-20 L50,0 L30,20"/>
  </g>
  <!-- React atom -->
  <g transform="translate(200, 75)" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.3">
    <ellipse cx="0" cy="0" rx="25" ry="8" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="25" ry="8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="25" ry="8" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="4" fill="#58a6ff" opacity="0.5"/>
  </g>
  <!-- Monitor icon -->
  <g transform="translate(200, 145)" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.4">
    <rect x="-30" y="-15" width="60" height="35" rx="3"/>
    <line x1="-15" y1="20" x2="15" y2="20"/>
    <line x1="0" y1="20" x2="0" y2="28"/>
    <line x1="-10" y1="28" x2="10" y2="28"/>
  </g>
  <!-- Title -->
  <text x="200" y="215" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="12" font-weight="bold">Portfolio Website</text>
  <text x="200" y="233" text-anchor="middle" fill="#666" font-family="monospace" font-size="10">React · Vite · TypeScript</text>
</svg>
